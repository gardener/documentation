name: Vale

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'website/**/*.md'
      - '.vale.ini'
      - '.vale/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  vale:
    name: Lint prose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            website/**/*.md
          files_ignore: |
            website/about/legal-disclosure.md
            website/archived/**
          json: true

      - name: Vale
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: vale-cli/vale-action@v2.1.1
        with:
          files: '${{ steps.changed-files.outputs.all_changed_files }}'
          vale_flags: "--minAlertLevel=warning"
          reporter: github-pr-review
          fail_on_error: true
          filter_mode: file
