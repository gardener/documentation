StylesPath = .vale/styles
MinAlertLevel = warning

Vocab = GardenerTerms, ThirdPartyProducts, TechJargon, General

IgnoredScopes = code, tt, code block

[*.md]
BasedOnStyles = Gardener

TokenIgnores = (`[^`]+`), (v[0-9]+(?:\.[0-9]+)*(?:alpha[0-9]+|beta[0-9]+)?), (/[^\s]+), (https?://\S+), ([a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-zA-Z]+), (\w+\(s\)), (\*+\w+\**|\w+\*+)

BlockIgnores = (?s)(\{\{.*?\}\})

[website/about/legal-disclosure.md]
BasedOnStyles =

[website/archived/**]
BasedOnStyles =
